<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javascript-api-practice-file</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        html,
        body {
            width: 100%;
            height: auto;
            scroll-behavior: smooth;
        }

        h1 {
            text-align: center;
            font-size: 3rem;
        }

        .api_call_btn {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .api_call_btn button {
            margin-top: 20px;
            padding: 12px 26px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 5px;
            transition: all ease-in-out 0.3s;
        }

        .api_call_btn button:hover {
            background-color: blueviolet;
            color: burlywood;
            cursor: pointer;
        }

        #comment_container {
            margin: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .comment {
            background-color: rgb(255, 255, 255);
            box-shadow: 1px 1px 1px 1px gray;
            height: 100%;
            padding: 20px;
            text-align: center;
        }

        #user_container {
            max-width: 1800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }

        .users_section {
            background-color: wheat;
            box-shadow: 5px 5px 1px 1px gray;
            padding: 30px 30px 30px 40px;
            border-radius: 10px;
            height: 100%;
        }
    </style>
</head>

<body>
    <h1>JavaScript API Practice File</h1>
    <div class="api_call_btn">
        <button onclick="load_data()">Loading Api Data</button>
    </div>

    <div id="comment_container"></div>
    <div id="user_container"></div>

    <script src="api.js"></script>
</body>

</html>
